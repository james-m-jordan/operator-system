name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run tests
        run: python3 -m unittest tests/test_scaffold_workspace.py
      - name: Release audit
        run: python3 scripts/audit_release.py --json
      - name: Build release archive
        run: python3 scripts/package_release.py --version "${GITHUB_REF_NAME#v}" --out dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "operator-system-starter $GITHUB_REF_NAME" \
            --notes "See CHANGELOG.md for details." \
            dist/operator-system-starter-*.tar.gz \
            dist/operator-system-starter-*.manifest.json
